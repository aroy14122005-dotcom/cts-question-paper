{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Changed</title>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}?v=2028">

</head>

<body>

<div class="wrapper">

    <div class="form-header forgot-header">

        <div class="titles">

            <span class="title-register">
                Success
            </span>

        </div>

    </div>

    <div class="register-form" style="left:32px;">

        <div style="text-align:center; margin-top:20px;">

            <i class='bx bx-check-circle'
               style="font-size:80px;color:#16a34a;"></i>

            <h2 style="margin:20px 0 15px;">
                Password Changed Successfully
            </h2>

            <p style="color:#666;line-height:1.7;">
                Your password has been updated successfully.
                <br>
                You can now log in using your new password.
            </p>

        </div>

        <div class="input-box" style="margin-top:35px;">

            <a href="{% url 'login' %}?login=true"
               class="btn-submit"
               style="
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    text-decoration:none;
               ">

                Back to Login

            </a>

        </div>

    </div>

</div>

</body>

</html>
