{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Set New Password</title>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}?v=2028">

</head>

<body>

<div class="wrapper">

    <div class="form-header forgot-header">

        <div class="titles">

            <span class="title-register">
                New Password
            </span>

        </div>

    </div>

    <div class="register-form" style="left:32px;">

        {% if validlink %}

        {% if form.errors %}
        <div style="color:red; margin-bottom:20px;">
             {{ form.errors }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="input-box">

                <input
                    type="password"
                    name="new_password1"
                    id="new_password1"
                    class="input-field"
                    required
                >

                <label for="new_password1" class="label">
                    New Password
                </label>

                <i class='bx bx-lock-alt icon'></i>

            </div>

            <div class="input-box">

                <input
                    type="password"
                    name="new_password2"
                    id="new_password2"
                    class="input-field"
                    required
                >

                <label for="new_password2" class="label">
                    Confirm Password
                </label>

                <i class='bx bx-lock-alt icon'></i>

            </div>

            <div class="input-box">

                <button type="submit" class="btn-submit">

                    Change Password

                </button>

            </div>

        </form>

        {% else %}

        <div style="text-align:center;">

            <i class='bx bx-error-circle'
               style="font-size:70px;color:#dc3545;"></i>

            <h2 style="margin:20px 0;">
                Invalid Link
            </h2>

            <p style="color:#666;">
                This password reset link is invalid
                or has already expired.
            </p>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
