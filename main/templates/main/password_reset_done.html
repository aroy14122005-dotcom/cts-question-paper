{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Email Sent</title>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="wrapper">

    <div class="form-header forgot-header">
        <div class="titles">
            <span class="title-register">Email Sent</span>
        </div>
    </div>

    <div class="register-form" style="left:32px;">

        <div style="text-align:center; margin-top:20px;">

            <i class='bx bx-envelope'
               style="font-size:70px;color:#0d1936;"></i>

            <h2 style="margin:20px 0 15px;">
                Check Your Email
            </h2>

            <p style="color:#666;line-height:1.7;">
                We've emailed you instructions for resetting your password.
                <br><br>
                If you don't receive an email within a few minutes,
                please check your spam folder.
            </p>

        </div>

        <div class="input-box" style="margin-top:35px;">
            <a href="{% url 'login' %}?login=true"
               class="btn-submit"
               style="display:flex;align-items:center;justify-content:center;text-decoration:none;">
                Back to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
